# Entropy — Host Nginx Configuration for AWS
#
# File location on the server:
#   /etc/nginx/sites-available/entropy
#
# After copying, enable it:
#   sudo ln -s /etc/nginx/sites-available/entropy /etc/nginx/sites-enabled/entropy
#   sudo nginx -t && sudo systemctl reload nginx
#
# Run certbot AFTER the HTTP block is working:
#   sudo certbot --nginx -d entropy.kwixlab.com
# Certbot will automatically modify this file to add the HTTPS block.
#
# Architecture:
#   Port 80  → serve ACME challenge files (for certbot), redirect rest to HTTPS
#   Port 443 → serve React dashboard static files + proxy /api/* to FastAPI

server {
    listen 80;
    server_name entropy.kwixlab.com;

    # ACME challenge for certbot — must work on HTTP before you can get a cert
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name entropy.kwixlab.com;

    # SSL certificates managed by certbot
    # These paths are populated automatically when you run:
    #   sudo certbot --nginx -d entropy.kwixlab.com
    ssl_certificate     /etc/letsencrypt/live/entropy.kwixlab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/entropy.kwixlab.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── React dashboard (static files) ──────────────────────────────────────
    root /home/ubuntu/entropy-tracker/dashboard/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Aggressive caching for versioned assets (Vite adds content hashes)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── FastAPI backend (Docker container on 127.0.0.1:8000) ─────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts — entropy scans can take 30-60 seconds
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"  always;
    add_header X-Content-Type-Options   "nosniff"     always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=()" always;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 1000;
    gzip_proxied    any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
